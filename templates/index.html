<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShellAgent</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span>ShellAgent</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="model-selector" id="modelSelector" onclick="toggleModelDropdown()">
        <span id="currentModel">gpt-4o</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="model-dropdown" id="modelDropdown">
        <div class="dropdown-item" onclick="setModel('gpt-4o')">gpt-4o</div>
        <div class="dropdown-item" onclick="setModel('gpt-4o-mini')">gpt-4o-mini</div>
        <div class="dropdown-item" onclick="setModel('o3-mini')">o3-mini</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="mode-toggle">
        <button class="mode-btn active" id="autoMode" onclick="setAutoExec(true)">Auto-execute</button>
        <button class="mode-btn" id="manualMode" onclick="setAutoExec(false)">Manual</button>
      </div>
    </div>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>
      <h1>ShellAgent</h1>
      <p>AI-powered shell commands. Ask anything.</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('Show system information')">System Info</button>
        <button class="quick-btn" onclick="sendQuick('List files in current directory')">List Files</button>
        <button class="quick-btn" onclick="sendQuick('Check disk usage')">Disk Usage</button>
        <button class="quick-btn" onclick="sendQuick('Show running processes')">Processes</button>
      </div>
    </div>
    <div id="messages"></div>
  </main>

  <footer class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for newline</div>
  </footer>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
