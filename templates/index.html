<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShellAgent</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span>ShellAgent</span>
        <span class="version">v4.0</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="provider-selector" id="providerSelector">
        <div class="provider-btn active" data-provider="openai" onclick="setProvider('openai')">OpenAI</div>
        <div class="provider-btn" data-provider="nvidia" onclick="setProvider('nvidia')">NVIDIA</div>
        <div class="provider-btn" data-provider="ollama" onclick="setProvider('ollama')">Ollama</div>
      </div>
      <div class="model-selector" id="modelSelector" onclick="toggleModelDropdown()">
        <span id="currentModel">gpt-4o</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="model-dropdown" id="modelDropdown"></div>
    </div>
    <div class="topbar-right">
      <div class="iter-badge" id="iterBadge" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span id="iterText">1</span>
      </div>
      <div class="status-dot" id="statusDot" title="Ready"></div>
    </div>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </div>
      <h1>ShellAgent</h1>
      <p class="welcome-sub">Full agentic AI · Shell + Web search + File ops · Auto-retry · No timeout</p>
      <div class="provider-info" id="providerInfo">OpenAI · gpt-4o · 6 tools</div>
      <div class="tool-pills">
        <span class="tool-pill">⚡ shell</span>
        <span class="tool-pill">🔍 web search</span>
        <span class="tool-pill">🌐 web fetch</span>
        <span class="tool-pill">📖 read file</span>
        <span class="tool-pill">✏️ write file</span>
        <span class="tool-pill">📁 list dir</span>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('Search the web for the latest Node.js LTS version and install it')">📦 Install Node.js</button>
        <button class="quick-btn" onclick="sendQuick('Search for how to set up a Python virtual environment, then create one here')">🐍 Setup Python Venv</button>
        <button class="quick-btn" onclick="sendQuick('List all files in the current directory')">📁 Files</button>
        <button class="quick-btn" onclick="sendQuick('Show system info: OS, CPU, memory, disk, network')">🖥 System</button>
        <button class="quick-btn" onclick="sendQuick('Search for best practices to optimize a Node.js app, then apply them')">⚡ Optimize</button>
        <button class="quick-btn" onclick="sendQuick('Look up the latest security advisories for installed packages')">🔒 Security</button>
      </div>
    </div>
    <div id="messages"></div>
  </main>

  <footer class="input-area">
    <div class="input-wrap">
      <div class="input-prefix">❯</div>
      <textarea id="userInput" placeholder="Ask anything — I can search the web, run commands, read/write files..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-hint">
      <span>Enter to send</span>
      <span>·</span>
      <span>⚡ shell</span>
      <span>·</span>
      <span>🔍 web</span>
      <span>·</span>
      <span>📄 files</span>
    </div>
  </footer>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
